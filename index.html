<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metiertechnology - Under Construction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .logo img {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            color: #222;
        }

        h2 {
            margin: 10px 0;
            color: #ff9800;
        }

        p {
            color: #666;
            font-size: 15px;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #444;
            line-height: 1.6;
        }

        .contact {
            margin-top: 15px;
            font-weight: 500;
        }

        .contact span {
            display: block;
        }

        /* subtle animation */
        .logo img {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <img src="logo.png" alt="Metiertechnology Logo">
        </div>

        <h1>Metiertechnology</h1>
        <h2>🚧 Website Under Construction</h2>

        <p>We’re working hard to bring something amazing. Stay tuned!</p>

        <div class="footer">
            <strong>Address:</strong><br>
            Metiertechnology, #407, Jigani,<br>
            Bengaluru - 560105

            <div class="contact">
                <span>Email: Info@metiertechnology.com</span>
                <span>Phone: +91 8884770076</span>
            </div>
        </div>
    </div>

</body>
</html>
