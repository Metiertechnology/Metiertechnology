<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metiertechnology - Under Construction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {

            max-width: 400px;
            width: 90%;
        }

        .logo img {
            width: 110px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            color: #222;
        }

        h2 {
            margin: 10px 0;
            color: #555;
            font-weight: normal;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        .contact {
            margin-top: 15px;
        }

        .contact span {
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <img src="logo.png" alt="Metiertechnology Logo">
        </div>

        <h1>Metiertechnology</h1>

        <p>We’ll be live soon. Thank you for your patience.</p>

        <div class="footer">
            <strong>Address:</strong><br>
            Metiertechnology, #407, Jigani,<br>
            Bengaluru - 560105

            <div class="contact">

            </div>

</html>
